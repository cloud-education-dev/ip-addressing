name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger build on push to main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared network library
        run: npm run build --workspace=libs/networking

      - name: Build Next.js site
        env:
          STATIC_EXPORT: 'true'
        run: npm run build:web

      - name: Ensure .nojekyll exists in build output
        run: touch apps/web/out/.nojekyll

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: apps/web/out  # Directory Next.js exports static files into
          branch: gh-pages      # The branch to deploy to
