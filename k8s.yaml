apiVersion: v1
kind: Namespace
metadata:
  name: ip-intel

---
# Next.js Web Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ip-intel
spec:
  ports:
    - port: 3000
  selector:
    app: web

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ip-intel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ip-intel-web:latest
          ports:
            - containerPort: 3000
